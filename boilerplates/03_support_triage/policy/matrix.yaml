version: "1.0.0"
tenant_id: "your-org"
effective: "2026-01-01T00:00:00Z"

agent_roles:
  support_analyst:
    permitted_tools: [read_ticket, llm_classification, llm_generation]
    permitted_data_sources: [tickets, customer_history]
    permitted_task_types:
      - deterministic
      - llm_classification
      - llm_generation
    max_llm_calls_per_step: 5

budget_policy:
  max_cost_per_call_usd: 0.05
  max_cost_per_step_usd: 0.15
  max_cost_per_workflow_usd: 0.50
  max_cost_per_user_day_usd: 5.00
  max_cost_per_tenant_day_usd: 50.00

compliance_rules:
  - rule_ref: "REFUND-GATE-001"
    condition:
      field: "task_type"
      operator: "equals"
      value: "llm_generation"
    action: require_human_gate
    remediation_hint: >
      Response drafts require human review before sending.
      Reviewer must verify accuracy and tone.

risk_policy:
  irreversible_min_confidence: 0.90
  always_gate_action_classes: []
  auto_approve_action_classes:
    - deterministic
    - llm_classification

loop_policy:
  max_replan_attempts: 3
  max_duration_s: 120
