version: "1.0.0"
tenant_id: "your-org"
effective: "2026-01-01T00:00:00Z"

agent_roles:
  db_analyst:
    permitted_tools: [read_sql_file, llm_extraction, llm_evaluation]
    permitted_data_sources: [migrations, schema_registry, destructive_ops, production_schema]
    permitted_task_types:
      - deterministic
      - llm_extraction
      - llm_evaluation
      - llm_summarization
    max_llm_calls_per_step: 5

budget_policy:
  max_cost_per_call_usd: 0.05
  max_cost_per_step_usd: 0.20
  max_cost_per_workflow_usd: 0.50
  max_cost_per_user_day_usd: 5.00
  max_cost_per_tenant_day_usd: 50.00

compliance_rules:
  - rule_ref: "DB-DROP-001"
    condition:
      field: "data_required"
      operator: "contains"
      value: "destructive_ops"
    action: require_human_gate
    remediation_hint: >
      Migrations containing DROP or TRUNCATE require DBA sign-off.

  - rule_ref: "DB-PROD-BLOCK"
    condition:
      field: "data_required"
      operator: "contains"
      value: "production_schema"
    action: require_human_gate
    remediation_hint: >
      Direct production schema changes require senior engineer approval.

risk_policy:
  irreversible_min_confidence: 0.95
  always_gate_action_classes: []
  auto_approve_action_classes:
    - deterministic
    - llm_extraction
    - llm_evaluation
    - llm_summarization

loop_policy:
  max_replan_attempts: 3
  max_duration_s: 120
