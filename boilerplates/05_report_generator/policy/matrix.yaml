version: "1.0.0"
tenant_id: "your-org"
effective: "2026-01-01T00:00:00Z"

agent_roles:
  data_analyst:
    permitted_tools: [read_csv, llm_extraction, llm_summarization]
    permitted_data_sources: [reports, data_warehouse]
    permitted_task_types:
      - deterministic
      - llm_extraction
      - llm_summarization
    max_llm_calls_per_step: 5
  reporter:
    permitted_tools: [llm_generation, send_email]
    permitted_data_sources: []
    permitted_task_types: [llm_generation]
    max_llm_calls_per_step: 3

budget_policy:
  max_cost_per_call_usd: 0.05
  max_cost_per_step_usd: 0.20
  max_cost_per_workflow_usd: 1.00
  max_cost_per_user_day_usd: 10.00
  max_cost_per_tenant_day_usd: 100.00

compliance_rules: []

risk_policy:
  irreversible_min_confidence: 0.90
  always_gate_action_classes:
    - llm_generation
    # All report generation is gated — human must approve before anything is sent
  auto_approve_action_classes:
    - deterministic
    - llm_extraction
    - llm_summarization

loop_policy:
  max_replan_attempts: 3
  max_duration_s: 180
