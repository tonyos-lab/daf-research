# GDPR Tenant — strict PII handling
version: "1.0.0"
tenant_id: "gdpr-tenant"
effective: "2026-01-01T00:00:00Z"

agent_roles:
  document_processor:
    permitted_tools: [read_document, llm_extraction]
    permitted_data_sources: [documents, pii_data]
    permitted_task_types: [deterministic, llm_extraction, llm_summarization]
    max_llm_calls_per_step: 3

budget_policy:
  max_cost_per_call_usd: 0.03
  max_cost_per_step_usd: 0.10
  max_cost_per_workflow_usd: 0.30
  max_cost_per_user_day_usd: 3.00
  max_cost_per_tenant_day_usd: 30.00

compliance_rules:
  - rule_ref: "GDPR-PII-001"
    condition:
      field: "data_required"
      operator: "contains"
      value: "pii_data"
    action: block
    remediation_hint: >
      Direct PII access is blocked for GDPR compliance.
      Route through the approved anonymisation pipeline instead.

  - rule_ref: "GDPR-EXPORT-001"
    condition:
      field: "task_type"
      operator: "equals"
      value: "llm_generation"
    action: require_human_gate
    remediation_hint: >
      All document generation requires DPO review for GDPR tenants.

risk_policy:
  irreversible_min_confidence: 0.95
  always_gate_action_classes: []
  auto_approve_action_classes: [deterministic, llm_extraction, llm_summarization]

loop_policy:
  max_replan_attempts: 3
  max_duration_s: 120
