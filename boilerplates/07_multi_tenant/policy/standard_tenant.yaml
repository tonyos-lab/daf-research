# Standard Tenant — permissive, no special rules
version: "1.0.0"
tenant_id: "standard-tenant"
effective: "2026-01-01T00:00:00Z"

agent_roles:
  document_processor:
    permitted_tools: [read_document, llm_extraction, llm_summarization, llm_generation]
    permitted_data_sources: [documents, financial_records, pii_data, reports]
    permitted_task_types:
      - deterministic
      - llm_extraction
      - llm_summarization
      - llm_generation
    max_llm_calls_per_step: 5

budget_policy:
  max_cost_per_call_usd: 0.05
  max_cost_per_step_usd: 0.20
  max_cost_per_workflow_usd: 1.00
  max_cost_per_user_day_usd: 10.00
  max_cost_per_tenant_day_usd: 100.00

compliance_rules: []

risk_policy:
  irreversible_min_confidence: 0.80
  always_gate_action_classes: []
  auto_approve_action_classes:
    - deterministic
    - llm_extraction
    - llm_summarization
    - llm_generation

loop_policy:
  max_replan_attempts: 3
  max_duration_s: 180
